<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UFO RIT SYSTEM</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:16px;display:flex;justify-content:center}
.card{background:#fff;max-width:800px;width:100%;padding:18px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
h2{text-align:center;margin:0 0 16px}
.label{font-weight:bold;margin:10px 0 5px}
input,select,button{width:100%;box-sizing:border-box;padding:10px;border-radius:8px;border:1px solid #ccc;font-size:14px}
button{margin-top:16px;background:#28a745;color:#fff;border:none;cursor:pointer}
button:disabled{background:#999}
.toast{display:none;padding:10px;border-radius:8px;margin-bottom:10px;text-align:center;font-weight:bold}
.success{background:#d4edda;color:#155724}
.error{background:#f8d7da;color:#721c24}
  /* ===== FORM 2 KOLOM ===== */
.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.form-item{
  display:flex;
  flex-direction:column;
}

.full{
  grid-column:1 / -1;
}

/* HP */
@media(max-width:600px){
  .form-grid{
    grid-template-columns:1fr;
  }

  .full{
    grid-column:auto;
  }
}
</style>
</head>
<body>
<div class="card">
<h2>INPUT RIT RITAN PENGIRIMAN</h2>
<div id="toast" class="toast"></div>



<div id="toast" class="toast full"></div>

<div class="form-grid">

<div class="form-item">
<div class="label">SOPIR</div>
<select id="sopir"></select>
</div>

<div class="form-item">
<div class="label">KERNET</div>
<select id="kernet"></select>
</div>

<div class="form-item">
<div class="label">NO SJ</div>
<input id="sj" placeholder="Masukkan No SJ">
</div>

<div class="form-item">
<div class="label">TANGGAL SURAT JALAN</div>
<input type="date" id="tanggal">
</div>

<div class="form-item">
<div class="label">NO FAKTUR</div>
<input id="faktur" placeholder="Masukkan No Faktur">
</div>

<div class="form-item">
<div class="label">DK / LK</div>
<select id="dklk">
<option value="DK">DK</option>
<option value="LK">LK</option>
</select>
</div>

<div class="form-item">
<div class="label">SELFIE</div>
<input type="number" id="selfie" value="0" min="0">
</div>

<div class="form-item">
<div class="label">KETERANGAN</div>
<input id="keterangan">
</div>

<div class="full">
<button onclick="kirim()">KIRIM DATA</button>
</div>

<div class="status full" id="status"></div>

</div>
</div>
<script>
const API="https://script.google.com/macros/s/AKfycbxu2kklzIUIPozlqscps0Zq2SuqvqV98CWT4w-XFWjOkDH0y0MLv7sBK0eJvt12eo6fXQ/exec";
function toast(msg,ok){const t=toastEl=document.getElementById("toast");t.className="toast "+(ok?"success":"error");t.textContent=msg;t.style.display="block";setTimeout(()=>t.style.display="none",3000);}
fetch(API+"?action=master").then(r=>r.json()).then(d=>{
sopir.innerHTML=d.sopir.map(v=>`<option>${v}</option>`).join("");
kernet.innerHTML=d.kernet.map(v=>`<option>${v}</option>`).join("");
});
function kirim(){
if(!sj.value||!tanggal.value||!faktur.value){toast("Lengkapi data.",false);return;}
btn.disabled=true;status.textContent="Mengirim...";
fetch(API,{method:"POST",body:JSON.stringify({
sopir:sopir.value,kernet:kernet.value,sj:sj.value,
tanggal:tanggal.value,faktur:faktur.value,
dklk:dklk.value,selfie:Number(selfie.value),
keterangan:keterangan.value
})}).then(r=>r.text()).then(res=>{
btn.disabled=false;status.textContent="";
if(res.indexOf("ok")>-1){toast("Data berhasil disimpan",true);}
else{toast(res,false);}
}).catch(e=>{btn.disabled=false;status.textContent="";toast("Gagal mengirim",false);});
}
</script>
</body></html>
